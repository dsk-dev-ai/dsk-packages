version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata

    versioning-strategy: increase
    open-pull-requests-limit: 10

    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"

      typescript:
        patterns:
          - "typescript"
          - "@types/*"

      changesets:
        patterns:
          - "@changesets/*"

    ignore:
      # TypeScript 7 breaks current @typescript-eslint stack
      - dependency-name: "typescript"
        versions:
          - ">=7.0.0"

      # Vitest 4 requires ecosystem updates
      - dependency-name: "vitest"
        versions:
          - ">=4.0.0"

    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata

    labels:
      - dependencies

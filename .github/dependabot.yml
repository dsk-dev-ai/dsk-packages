version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata

    versioning-strategy: increase
    open-pull-requests-limit: 10

    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"

      changesets:
        patterns:
          - "@changesets/*"

    ignore:
      # Keep stable TypeScript version
      - dependency-name: "typescript"
        versions:
          - ">=6.0.0"

      # Prevent breaking Vitest upgrade
      - dependency-name: "vitest"
        versions:
          - ">=4.0.0"

    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata

    labels:
      - dependencies
